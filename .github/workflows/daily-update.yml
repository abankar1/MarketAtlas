name: Daily market data update

# Schedule the market data update for after the 4:00 PM ET market close,
# allowing ~30 min for Marketstack to publish the day's final bars.
#
# GitHub cron runs in UTC and DOES NOT honor DST; the schedule may drift
# by an hour twice a year. Acceptable for an after-close batch job.
#
# `workflow_dispatch` lets you trigger an ad-hoc run from the Actions tab.
on:
  schedule:
    - cron: "0 9 * * 1"    # 09:00 UTC Monday (early-morning US Pacific)
    - cron: "0 1 * * 4"    # 01:00 UTC Thursday (= Wed evening US Pacific)
    - cron: "0 1 * * 6"    # 01:00 UTC Saturday (= Fri evening US Pacific)
  workflow_dispatch:

# Avoid stacking two runs if a previous one is still going (e.g. retries).
concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    name: Fetch latest daily bars
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # Map repo-level secrets to the env-var names settings.py expects.
      # See src/config/settings.py — the env-var path activates whenever
      # DB_URL is set.
      DB_URL: ${{ secrets.DB_URL }}
      MARKETDATA_TOKEN: ${{ secrets.MARKETDATA_TOKEN }}
      DAYS: ${{ secrets.DAYS }}
      API_SLEEP_SECONDS: ${{ secrets.API_SLEEP_SECONDS }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
      MARKETAUX_TOKEN: ${{ secrets.MARKETAUX_TOKEN }}
      # PYTHONUNBUFFERED=1 keeps print() output flushing in real time so
      # logs appear immediately in the GHA console.
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily update
        run: python -m src.main
