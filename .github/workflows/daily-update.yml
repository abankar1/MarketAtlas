name: Daily market data update

# Schedule the market data refresh for early-morning US/Pacific so the app
# has fresh closes ready before the workday begins. Each run captures the
# most recent trading day's adjusted bars from Marketstack.
#
# GitHub cron runs in UTC and DOES NOT honor DST; the schedule may drift
# by an hour twice a year. Acceptable for an early-morning batch.
#
# `workflow_dispatch` lets you trigger an ad-hoc run from the Actions tab.
on:
  schedule:
    - cron: "0 9 * * 1"    # Monday 09:00 UTC = 1 AM PST / 2 AM PDT
    - cron: "0 9 * * 3"    # Wednesday 09:00 UTC = 1 AM PST / 2 AM PDT
    - cron: "0 9 * * 5"    # Friday 09:00 UTC = 1 AM PST / 2 AM PDT
  workflow_dispatch:

# Avoid stacking two runs if a previous one is still going (e.g. retries).
concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    name: Fetch latest daily bars
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # Map repo-level secrets to the env-var names settings.py expects.
      # See src/config/settings.py — the env-var path activates whenever
      # DB_URL is set.
      DB_URL: ${{ secrets.DB_URL }}
      MARKETDATA_TOKEN: ${{ secrets.MARKETDATA_TOKEN }}
      DAYS: ${{ secrets.DAYS }}
      API_SLEEP_SECONDS: ${{ secrets.API_SLEEP_SECONDS }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
      MARKETAUX_TOKEN: ${{ secrets.MARKETAUX_TOKEN }}
      # PYTHONUNBUFFERED=1 keeps print() output flushing in real time so
      # logs appear immediately in the GHA console.
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily update
        run: python -m src.main
